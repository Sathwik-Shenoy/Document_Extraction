services:
  api:
    build: .
    container_name: doc-analyzer-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=dev
      - USE_HEAVY_MODELS=false
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/analyzer
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: doc-analyzer-db
    environment:
      - POSTGRES_DB=analyzer
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: doc-analyzer-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
